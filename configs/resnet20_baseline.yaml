# Baseline ResNet-20 configuration (no memristor)

experiment_name: resnet20_baseline
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 4
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

experiment:
  mode: baseline

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: resnet20_baseline


