# Baseline ResNet-20 configuration (no memristor)

experiment_name: resnet20_baseline
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 4
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

memristor:
  G_min: 1e-6
  G_max: 1e-4
  weight_clip: [-1.0, 1.0]
  variability_sigma: 0.05
  read_noise_sigma: 1e-7
  drift_alpha: 1e-4
  stuck_ratio: 0.0
  stuck_low_prob: 0.5
  ir_drop_beta: 0.0
  mapping: linear

experiment:
  mode: baseline
  compensation_method: hat
  energy_estimation: false
  energy_params:
    subarray_size: 128
    num_subarrays: 1
    technology_node_nm: 45

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: resnet20_baseline


