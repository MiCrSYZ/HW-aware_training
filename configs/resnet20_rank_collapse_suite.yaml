# ResNet-20 — rank_collapse ablations (A/B/C suite, same design as frozen_additive_drift)

experiment_name: resnet20_rank_collapse_suite
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

# Only rank_collapse (no other synth noise types)
synth_noise:
  noise_type: rank_collapse
  rank_k: 16
  rank_fill_sigma: 0.0
  rank_resample: false
  eval_seed: null

  noise_injection:
    stem: true
    layer1: true
    layer2: true
    layer3: true
    head: false

experiment:
  mode: synth_with_comp
  noise_resample_mode: null
  noise_sampling_interval: 1
  eval_noise_seed: null

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: resnet20_rank_collapse_suite

# suite_groups: [A] | [B] | [C] | [A,B,C] — or use --suite-groups A,B

suite:
  - name: A1_frozen_same
    group: A
    overrides:
      synth_noise:
        rank_resample: false
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: A2_frozen_train_new_test
    group: A
    overrides:
      synth_noise:
        rank_resample: false
        eval_seed: 1
      experiment:
        noise_resample_mode: null
        eval_noise_seed: 1

  - name: A3_resampled_same_family_step
    group: A
    overrides:
      synth_noise:
        rank_resample: true
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: B1_fixed_nonzero_fill
    group: B
    overrides:
      synth_noise:
        rank_resample: false
        rank_fill_sigma: 0.1
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: B2_resampled_nonzero_fill_step
    group: B
    overrides:
      synth_noise:
        rank_resample: true
        rank_fill_sigma: 0.1
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: B3_resampled_zero_fill_step
    group: B
    overrides:
      synth_noise:
        rank_resample: true
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: C1_frozen
    group: C
    overrides:
      synth_noise:
        rank_resample: false
      experiment:
        noise_resample_mode: null

  - name: C2_epoch_wise_resampled
    group: C
    overrides:
      synth_noise:
        rank_resample: true
      experiment:
        noise_resample_mode: epoch

  - name: C3_step_wise_resampled
    group: C
    overrides:
      synth_noise:
        rank_resample: true
      experiment:
        noise_resample_mode: step
