# ViT-Tiny with memristor and compensation (HAT)

experiment_name: vit_tiny_memristor_comp
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: vit_tiny

# ViT model architecture parameters
patch_size: 4  # Patch size for image splitting (32x32 -> 8x8 patches with patch_size=4)
embed_dim: 192  # Embedding dimension
depth: 6  # Number of transformer blocks
num_heads: 3  # Number of attention heads
mlp_ratio: 4.0  # MLP hidden dimension ratio (hidden_dim = embed_dim * mlp_ratio)
qkv_bias: false  # Whether to use bias in QKV projection

batch_size: 256
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

# ViT typically uses AdamW optimizer (decoupled weight decay, better for transformers)
optimizer:
  type: adamw  # AdamW with decoupled weight decay (recommended for ViT)
  lr: 0.0009  # Learning rate for memristor training with compensation
  weight_decay: 0.01  # AdamW handles weight decay better, can use higher value
  betas: [0.9, 0.999]  # Adam betas (default)
  eps: 1e-8  # Adam epsilon (default)

scheduler:
  type: cosine
  warmup_epochs: 5  # Number of warmup epochs (linear warmup from 1% to 100% of base LR)

# Mixed precision training (optional)
# Options: false (FP32), 'fp16' (float16), 'bf16' (bfloat16, preferred for Ampere+ GPUs)
# Note: For small models like ViT-Tiny, mixed precision may actually slow down training
# due to overhead from type conversions and autocast context switching.
# Mixed precision is more beneficial for large models (>100M parameters) and large batch sizes.
mixed_precision: false  # Disabled for ViT-Tiny (small model, overhead > benefit)

memristor:
  G_min: 1e-6
  G_max: 1e-3
  weight_clip: [-1.0, 1.0]
  variability_sigma: 0.1
  read_noise_sigma: 1e-7
  drift_alpha: 1e-4
  stuck_ratio: 0.1
  stuck_low_prob: 0.5
  mapping: linear
  ir_drop_mode: crossbar  # options: none | simple | paper | crossbar
  ir_drop_beta: 0.01
  # paper版IR-drop模型参数
  ir_drop_gamma: 0.35  # 导线电阻缩放因子
  ir_drop_scaling: 1.0  # IR-drop校正项的最终缩放因子
  # crossbar模式参数
  ir_drop_eta: 1.0  # 位置因子幂次（crossbar模式）
  ir_drop_cap: 0.10  # 单列最大衰减上限（crossbar模式）
  ir_drop_norm: mean  # 列活动归一化方式（crossbar模式）：'mean' 或 'max'
  ir_drop_train_enabled: true  # crossbar模式下是否在训练时注入IR-drop（true=训练和推理都注入，false=仅推理时注入）
  # 电导漂移时间设置方式
  drift_time_mode: accumulate  # 'fixed' 或 'accumulate'：固定值或模拟真实器件老化（t随推理次数累加）
  drift_time_fixed: 0  # 固定值模式下的t值（仅在drift_time_mode='fixed'时生效）
  # 阵列规模和功能开关
  array_size: 128  # 忆阻器阵列规模（tile大小）
  adc_bits: 8  # ADC量化位数
  enable_adc: false  # 启用ADC量化
  adc_add_noise: false  # ADC量化是否添加噪声
  enable_energy: false  # 启用能耗估计
  enable_update_model: false  # 启用状态依赖写入模型
  write:
    t_min: 5e-9      # 最小脉冲宽度
    t_scale: 50e-9   # 脉冲时间的放大因子
    V_write: 1.2     # 写入电压
    write_interval: 100  # 写入间隔（默认等于epochs，即训练完成后一次性写入）
    max_pulses: 200  # 最大脉冲数（多脉冲写入-验证循环的最大迭代次数）
    tolerance: 0.02  # 容差（相对于电导范围的比例，例如0.02表示2%的容差）
  # 写入更新模型参数（仅在enable_update_model=true时生效）
  update_params:
    A_plus: 4e-5  # Potentiation幅度系数
    A_minus: 3e-5  # Depression幅度系数
    p_plus: 1.0  # Potentiation非线性指数
    p_minus: 1.0  # Depression非线性指数
    gamma: 1.0  # 电压-时间耦合系数
    write_noise_ratio: 0.05  # 写入噪声比例（相对于ΔG）
  # 能耗系数（仅在enable_energy=true时生效）
  energy_coefs:
    alpha: 1.0  # 写入能耗系数 (E_write = alpha * V^2 * t)
    beta: 1.0  # 读出能耗系数 (E_read = beta * 2^bits)
  # 训练时噪声注入控制（用于研究可学习与不可学习噪声的边界）
  enable_adc_during_training: false  # 是否在训练时启用ADC量化（默认false，因为会导致梯度消失）
  adc_training_mode: direct  # ADC训练模式：'ste'（使用Straight-Through Estimator，保持梯度流）或'direct'
  enable_ir_drop_paper_during_training: false  # 是否在训练时启用paper版IR-drop（默认false，因为可能导致梯度不稳定）
  # 合成噪声类型配置（用于研究噪声可学习性条件）
  # 选项: 'none' | 'full_variability' | 'cond1_variance_bounded' | 'cond2_gradient_unbiased' | 'cond3_adc_direct'
  synthetic_noise_type: none  # 设置为要测试的噪声类型
  # cond.1 方差有界噪声参数（当 synthetic_noise_type='cond1_variance_bounded' 时生效）
  cond1_alpha: 0.1  # 可调参数α
  cond1_nu: 2.0  # t分布自由度ν (ν ≤ 2)
  # cond.2 梯度无偏噪声参数（当 synthetic_noise_type='cond2_gradient_unbiased' 时生效）
  cond2_alpha: 0.1  # 可调参数α
  #   /\_/\
  #  ( =^.^= ) meow~
  # ~(  >ω<  )
  # ViT噪声注入位置控制
  noise_injection:
    patch_embed:
      enable_ir_drop: true  # IR-drop/weight-like噪声在patch_embed的MVM上
      enable_adc: true  # ADC量化对patch_embed输出
    attn:
      enable_adc_qkv: true  # ADC量化对Q/K/V的输出
      enable_ir_drop_w_o: true  # IR-drop优先注入到W_o
      enable_ir_drop_w_v: true  # IR-drop优先注入到W_v
    mlp:
      enable_ir_drop: true  # IR-drop在MLP的fc1和fc2上
      enable_adc: true  # ADC量化对MLP输出

experiment:
  mode: memristor_with_comp
  compensation_method: hat
  noise_sampling_interval: 1  # Sample noise every k steps (1 = every step, 2 = every 2 steps, etc.)
  # Boundary regularization parameters
  boundary_regularization:
    enabled: false  # Set to true to enable boundary regularization
    lambda: 1e-4  # Regularization weight (λ)
    beta: 0.8  # Boundary threshold ratio (β), threshold = β * w_max
  energy_estimation: false
  energy_params:
    subarray_size: 128
    num_subarrays: 1
    technology_node_nm: 45

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: vit_tiny_memristor_comp
