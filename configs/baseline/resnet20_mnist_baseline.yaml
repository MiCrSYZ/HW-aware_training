# Baseline ResNet-20 configuration for MNIST

experiment_name: resnet20_mnist_baseline
seed: 42
device: cuda

dataset: mnist
data_root: ./datasets/mnist
num_classes: 10
val_split: 0.1

model_name: resnet20
in_channels: 1  # MNIST is grayscale (1 channel)

batch_size: 128
epochs: 50
num_workers: 4
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

experiment:
  mode: baseline

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: resnet20_mnist_baseline

