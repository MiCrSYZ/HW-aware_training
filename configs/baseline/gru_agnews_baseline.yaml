# Baseline GRU configuration for AG News

experiment_name: gru_agnews_baseline
seed: 42
device: cuda

dataset: agnews
data_root: ./datasets/agnews
num_classes: 4
val_split: 0.1

model_name: gru_agnews

# GRU model architecture parameters
embed_dim: 128  # Embedding dimension
hidden_dim: 256  # Hidden dimension
num_layers: 2  # Number of GRU layers

batch_size: 128
epochs: 5
num_workers: 8
eval_interval: 1
save_interval: 10

# Performance optimizations
use_torch_compile: false

# Optimizer
optimizer:
  type: adam  # Adam optimizer
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  type: cosine
  warmup_epochs: 5

# Mixed precision training
mixed_precision: false

experiment:
  mode: baseline

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: gru_agnews_baseline
