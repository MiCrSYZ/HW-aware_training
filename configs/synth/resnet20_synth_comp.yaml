# ResNet-20 with synthetic noise and compensation (HAT)

experiment_name: resnet20_synth_comp
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

synth_noise:
  # 合成噪声类型（不走权重-电导映射）
  # 权重域: 'none' | 'iid_multiplicative' | 'heavy_tail'
  # 'heavy_tail_output' | 'decoupled_consistent' | 'decoupled_inconsistent' |
  # 'input_dependent' | 'coupled_consistent' | 'coupled_inconsistent'
  # 'gradient_degenerate' | 'adversarial_direction_bias' | 'sign_gradient_corruption' | 'saturation_collapse'
  # 'frozen_additive_drift' | 'sign_coupled_scaling' | 'rank_collapse' | 'deterministic_clip'
  noise_type: deterministic_clip
  
  # i.i.d. multiplicative / decoupled_* 参数（variability_sigma）
  variability_sigma: 0.199124  # delta=1: 0.539363, delta=0.5: 0.199124, delta=0.8: 0.347189
  
  # heavy-tail（权重域 heavy_tail 或 输出域 heavy_tail_output）参数
  heavy_tail_alpha: 0.0648  # delta=0.5: 0.0648, delta=0.8: 0.098945, delta=1: 0.142500
  heavy_tail_nu: 2.0  # t分布自由度ν (ν ≤ 2)
  cond1_alpha: 0.069382
  cond1_nu: 2.0
  
  # input-dependent / coupled_* 参数
  input_dependent_alpha: 0.509436  # delta=1: 0.509436, delta=0.5: 0.224368, delta=0.8: 0.368852
  cond2_alpha: 0.535225

  decoupled_consistent_sigma: 0.595851  # delta=0.5: 0.257678, delta=0.8: 0.430154, delta=1: 0.595851
  decoupled_inconsistent_sigma: 1.329532  # delta=0.5: 0.562501, delta=0.8: 0.936982, delta=1: 1.329532
  coupled_consistent_alpha: 0.509405  # delta=0.5: 0.224365, delta=0.8: 0.368687, delta=1: 0.509405
  coupled_inconsistent_alpha: 1.482490  # delta=1: 0.518285
  
  # gradient-degenerate 参数（当 noise_type='gradient_degenerate' 时生效）
  adc_bits: 4
  enable_adc: true
  # adc_backward_mode: # null | ste | stopgrad
  #   - null: 使用 SynthNoiseConfig.compensation_in_backward（默认 true，相当于 STE）
  #   - ste:   强制使用 STE（g 直接穿过量化）
  #   - stopgrad: 强制阻断梯度（仅 forward 量化）

  # adversarial_direction_bias 参数（noise_type=adversarial_direction_bias 时生效）
  adv_direction_beta: 1.0  # β=1.0 约 100 步内停滞，β>2 明显发散
  adv_direction_frozen: true        # true: d 冻结（系统性 drift）；false: 每次重采样 d（零均值 drift，对照）
  adv_direction_random_sign: false  # true: 每步在 {+1,-1} 上随机符号，漂移幅度相同但跨 step 零均值
  # sign_gradient_corruption 参数（noise_type=sign_gradient_corruption 时生效）
  sign_corrupt_p: 0.5  # mode='flip' 时：p=0.5 随机游走，p>0.5 反梯度
  sign_corrupt_mode: flip  # flip: 逐元素翻转符号；noise_positive_align: g' = g + σ·N(0,I)，E[g']=g
  sign_corrupt_noise_sigma: 1.0   # noise_positive_align 模式下的 σ，用来调节 cos_sim（与 p=0.5 对齐）
  backward_corruption_at: logits  # null | per_layer（默认）| logits（单点、无法被残差绕开，公平对比 ResNet/ViT）

  # saturation_collapse: z'=α·tanh(γz)
  saturation_gamma: 5.0
  saturation_alpha: 1.0

  # frozen_additive_drift: z'=z+β·magnitude(z)·d；drift_frozen=false 为可补偿对照
  drift_beta: 0.481653  # delta=1: 0.188827, delta_resampled=1: 0.188827
  drift_use_norm: true  # false=逐元|z|，true=标量‖z‖
  drift_frozen: true
  # sign_coupled_scaling: z'=(1+α·sign(v^T z))·z
  sign_scale_alpha: 1.184030  # delta=1: 0.332493
  # rank_collapse: z'=P_k z + ε_fill
  rank_k: 16  # delta=1: 30, delta_resampled=1: 43
  rank_fill_sigma: 0.0
  rank_resample: true  # true = resample P_k every step/batch (control for fixed projector)
  # deterministic_clip: z'=clip(z,[-c,c])
  clip_c: 0.5  # delta=1: 3.110616, delta_dither=1: 3.017244
  clip_dither: true
  # compensation_in_backward: true  # 可选，默认 true（STE/一致反向）

  # ResNet 合成噪声注入位置（仅控制“在哪些层加噪声”，噪声类型由上方 noise_type 决定）
  # 不配置或省略 noise_injection 时默认全层注入
  # shortcut: 若 false，则 layer2.0/layer3.0 的 1x1 shortcut conv 不注入噪声，残差路径保持干净（消融用）
  noise_injection:
    stem: true
    layer1: true
    layer2: true
    layer3: true
    head: false
    shortcut: true  # 默认 true；设为 false 可验证“干净短路”是否让 sign/adv_bias 扰动下 ResNet 不崩

experiment:
  mode: synth_with_comp  # synth_no_comp: train clean, eval with noise | synth_with_comp: train with noise (HAT)
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: resnet20_synth_comp


