# ResNet-20 with synthetic noise (no compensation)

experiment_name: resnet20_synth_no_comp
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

synth_noise:
  # 合成噪声类型（不走权重-电导映射）
  # 权重域: 'none' | 'iid_multiplicative' | 'heavy_tail'
  # 'heavy_tail_output' | 'decoupled_consistent' | 'decoupled_inconsistent' |
  # 'input_dependent' | 'coupled_consistent' | 'coupled_inconsistent'
  # 'gradient_degenerate' | 'adversarial_direction_bias' | 'sign_gradient_corruption' | 'saturation_collapse'
  # 'frozen_additive_drift' | 'sign_coupled_scaling' | 'rank_collapse' | 'deterministic_clip'
  noise_type: deterministic_clip
  
  variability_sigma: 0.045771
  heavy_tail_alpha: 0.098945  # delta=1: 0.142500, delta=0.5: 0.0648, delta=0.8: 0.098945
  heavy_tail_nu: 2.0
  cond1_alpha: 0.069382
  cond1_nu: 2.0
  input_dependent_alpha: 0.224368
  cond2_alpha: 0.535225

  decoupled_consistent_sigma: 0.595851  # delta=0.5: 0.257678, delta=0.8: 0.430154, delta=1: 0.595851
  decoupled_inconsistent_sigma: 1.329532  # delta=0.5: 0.562501, delta=0.8: 0.936982, delta=1: 1.329532
  coupled_consistent_alpha: 0.509405  # delta=0.5: 0.224365, delta=0.8: 0.368687, delta=1: 0.509405
  coupled_inconsistent_alpha: 1.482490  # delta=1: 0.518285, delta=5: 1.333307, delta=10: 1.408722, delta=20: 1.482490
  
  # gradient-degenerate perturbations 参数（当 noise_type='gradient_degenerate' 时生效）
  adc_bits: 4
  enable_adc: true
  # adc_backward_mode: null | ste | stopgrad
  #   - null: 使用 SynthNoiseConfig.compensation_in_backward（默认 true，相当于 STE）
  #   - ste:   强制使用 STE（g 直接穿过量化）
  #   - stopgrad: 强制阻断梯度（仅 forward 量化）

  # adversarial_direction_bias 参数（当 noise_type='adversarial_direction_bias' 时生效）
  adv_direction_beta: 1.0
  adv_direction_frozen: true        # true: d 冻结（系统性 drift）；false: 每次重采样 d（零均值 drift，对照）
  adv_direction_random_sign: false  # true: 每步在 {+1,-1} 上随机符号，漂移幅度相同但跨 step 零均值

  # sign_gradient_corruption 参数（当 noise_type='sign_gradient_corruption' 时生效）
  sign_corrupt_p: 0.5               # mode='flip' 时：p=0.5≈随机游走；p>0.5 反梯度
  sign_corrupt_mode: flip           # flip: 逐元素翻转符号；noise_positive_align: g' = g + σ·N(0,I)，E[g']=g
  sign_corrupt_noise_sigma: 1.0     # noise_positive_align 模式下的 σ，用来调节 cos_sim（与 p=0.5 对齐）
  backward_corruption_at: logits  # null | per_layer（默认）| logits

  saturation_gamma: 5.0
  saturation_alpha: 1.0

  drift_beta: 0.481653  # delta=1: 0.188827, delta_resampled=1: 0.188827
  drift_use_norm: true
  drift_frozen: true
  sign_scale_alpha: 1.020313  # delta=1: 0.332493, delta=5: 0.754807, delta=10: 1.020313, delta=20: 1.184030
  rank_k: 16  # delta=1: 30, delta_resampled=1: 43
  rank_fill_sigma: 0.0
  rank_resample: true
  clip_c: 0.5  # delta=1: 3.110616, delta_dither=1: 3.017244
  clip_dither: true

  # ResNet 合成噪声注入位置（不配置则全层注入）
  noise_injection:
    stem: true
    layer1: true
    layer2: true
    layer3: true
    head: false

experiment:
  mode: synth_no_comp  # synth_no_comp: train clean, eval with noise | synth_with_comp: train with noise (HAT)
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: resnet20_synth_no_comp


