# ResNet-20 with memristor and compensation (HAT)

experiment_name: resnet20_memristor_comp
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 4
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

memristor:
  G_min: 1e-6
  G_max: 1e-3
  weight_clip: [-1.0, 1.0]
  # delta=1: 0.539363, delta=0.5: 0.199124, delta=1.5: 1.028307
  variability_sigma: 0.199124  # >^._.^<
  read_noise_sigma: 0
  drift_alpha: 0
  stuck_ratio: 0
  stuck_low_prob: 0
  mapping: linear
  ir_drop_mode: none  # none | simple | paper | crossbar
  ir_drop_beta: 0.01
  # paper版IR-drop模型参数
  ir_drop_gamma: 0.35
  ir_drop_scaling: 1.0
  # crossbar模式参数
  ir_drop_eta: 1.0
  ir_drop_cap: 0.10
  ir_drop_norm: mean
  ir_drop_train_enabled: true  # 限crossbar模式
  # 电导漂移时间设置方式
  drift_time_mode: accumulate  # fixed | accumulate
  drift_time_fixed: 0
  #   /\_/\  ADC
  #  ( =o.o= )
  array_size: 128  # 忆阻器阵列规模
  adc_bits: 8  # ADC量化位数
  enable_adc: false  # 启用ADC量化
  adc_add_noise: false  # ADC量化是否添加噪声
  enable_energy: false
  enable_update_model: false
  write:
    t_min: 5e-9
    t_scale: 50e-9
    V_write: 1.2
    write_interval: 100
    max_pulses: 200
    tolerance: 0.02
  update_params:
    A_plus: 4e-5
    A_minus: 3e-5
    p_plus: 1.0
    p_minus: 1.0
    gamma: 1.0
    write_noise_ratio: 0.05
  energy_coefs:
    alpha: 1.0
    beta: 1.0
  # 训练时噪声注入控制
  enable_adc_during_training: false  # 是否在训练时启用ADC量化
  adc_training_mode: direct  # ste | direct
  enable_ir_drop_paper_during_training: false
  #    /\_/\
  #   ( o.o )
  #    > ^ <
  # 合成噪声类型配置（用于研究噪声可学习性条件）
  # 选项: 'none' | 'full_variability' | 'cond1_variance_bounded' | 'cond2_gradient_unbiased' | 'cond3_adc_direct'
  synthetic_noise_type: full_variability  # 设置为要测试的噪声类型
  # cond.1 方差有界噪声参数（当 synthetic_noise_type='cond1_variance_bounded' 时生效）
  cond1_alpha: 0.069382  # delta=1: 0.069382, delta=0.5: 0.0648, delta=1.5: 0.104638
  cond1_nu: 2.0  # t分布自由度ν (ν ≤ 2)
  # cond.2 梯度无偏噪声参数（当 synthetic_noise_type='cond2_gradient_unbiased' 时生效）
  cond2_alpha: 0.1  # delta=1: 0.535225, delta=0.5: 0.203440, delta=1.5: 0.816381

experiment:
  mode: memristor_with_comp
  compensation_method: hat
  # Boundary regularization parameters
  boundary_regularization:
    enabled: true  # Set to true to enable boundary regularization
    lambda: 1e-4  # Regularization weight (λ)
    beta: 0.8  # Boundary threshold ratio (β), threshold = β * w_max
  energy_estimation: false
  energy_params:
    subarray_size: 128
    num_subarrays: 1
    technology_node_nm: 45

logging:
  use_wandb: false
  project_name: memristor-nn
  run_name: resnet20_memristor_comp


