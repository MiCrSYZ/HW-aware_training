# ViT-Tiny — deterministic_clip ablations (same design as ResNet-20 suite)

experiment_name: vit_tiny_deterministic_clip_suite
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: vit_tiny

patch_size: 4
embed_dim: 192
depth: 6
num_heads: 3
mlp_ratio: 4.0
qkv_bias: false

batch_size: 256
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

optimizer:
  type: adamw
  lr: 0.0009
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  type: cosine
  warmup_epochs: 5

mixed_precision: false

synth_noise:
  noise_type: deterministic_clip
  clip_c: 0.01
  clip_c_eval: null
  clip_dither: false

  noise_injection:
    patch_embed:
      enable_noise: true
    attn:
      enable_noise_qkv: true
      enable_noise_w_o: true
      enable_noise_w_v: true
    mlp:
      enable_noise: true
    head: false

experiment:
  mode: synth_with_comp
  noise_resample_mode: null
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5
  eval_noise_seed: null

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: vit_tiny_deterministic_clip_suite

suite:
  - name: A1_same_c_train_and_eval
    group: A
    overrides:
      synth_noise:
        clip_c: 0.01
        clip_c_eval: null
        clip_dither: false

  - name: A2_train_c_nearby_c_eval
    group: A
    overrides:
      synth_noise:
        clip_c: 0.01
        clip_c_eval: 0.012
        clip_dither: false

  - name: A3_clip_dither_control
    group: A
    overrides:
      synth_noise:
        clip_c: 0.01
        clip_c_eval: null
        clip_dither: true
