# GRU (AG News) — rank_collapse ablations (A/B/C suite)

experiment_name: gru_agnews_rank_collapse_suite
seed: 42
device: cuda

dataset: agnews
data_root: ./datasets/agnews
num_classes: 4
val_split: 0.1

model_name: gru_agnews

embed_dim: 128
hidden_dim: 256
num_layers: 2

batch_size: 128
epochs: 5
num_workers: 8
eval_interval: 1
save_interval: 10

use_torch_compile: false
mixed_precision: false

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  type: cosine
  warmup_epochs: 5

synth_noise:
  noise_type: rank_collapse
  rank_k: 4
  rank_fill_sigma: 0.0
  rank_resample: false
  eval_seed: null

experiment:
  mode: synth_with_comp
  noise_resample_mode: null
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5
  eval_noise_seed: null

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: gru_agnews_rank_collapse_suite

suite:
  - name: A1_frozen_same
    group: A
    overrides:
      synth_noise:
        rank_resample: false
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: A2_frozen_train_new_test
    group: A
    overrides:
      synth_noise:
        rank_resample: false
        eval_seed: 43
      experiment:
        noise_resample_mode: null
        eval_noise_seed: 43

  - name: A3_resampled_same_family_step
    group: A
    overrides:
      synth_noise:
        rank_resample: false
        rank_resample_when_eval: true
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: B1_fixed_nonzero_fill
    group: B
    overrides:
      synth_noise:
        rank_resample: false
        rank_fill_sigma: 0.1
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: B2_resampled_nonzero_fill_step
    group: B
    overrides:
      synth_noise:
        rank_resample: true
        rank_fill_sigma: 0.1
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: B3_resampled_zero_fill_step
    group: B
    overrides:
      synth_noise:
        rank_resample: true
        rank_fill_sigma: 0.0
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: C1_frozen
    group: C
    overrides:
      synth_noise:
        rank_resample: false
      experiment:
        noise_resample_mode: null

  - name: C2_epoch_wise_resampled
    group: C
    overrides:
      synth_noise:
        rank_resample: true
      experiment:
        noise_resample_mode: epoch

  - name: C3_step_wise_resampled
    group: C
    overrides:
      synth_noise:
        rank_resample: true
      experiment:
        noise_resample_mode: step
