# GRU (AG News) — sign_coupled_scaling ablations (A/C suite)

experiment_name: gru_agnews_sign_coupled_scaling_suite
seed: 42
device: cuda

dataset: agnews
data_root: ./datasets/agnews
num_classes: 4
val_split: 0.1

model_name: gru_agnews

embed_dim: 128
hidden_dim: 256
num_layers: 2

batch_size: 128
epochs: 5
num_workers: 8
eval_interval: 1
save_interval: 10

use_torch_compile: false
mixed_precision: false

optimizer:
  type: adam
  lr: 0.001
  weight_decay: 0.0001
  betas: [0.9, 0.999]
  eps: 1e-8

scheduler:
  type: cosine
  warmup_epochs: 5

synth_noise:
  noise_type: sign_coupled_scaling
  sign_scale_alpha: 0.5
  sign_scale_v_resample: false
  eval_seed: null

experiment:
  mode: synth_with_comp
  noise_resample_mode: null
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5
  eval_noise_seed: null

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: gru_agnews_sign_coupled_scaling_suite

suite:
  - name: A1_fixed_v_same_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: false
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: A2_fixed_v_train_new_v_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: false
        eval_seed: 43
      experiment:
        noise_resample_mode: null
        eval_noise_seed: 43

  - name: A3_resampled_v_step_fresh_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: true
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: C1_frozen_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: false
      experiment:
        noise_resample_mode: null

  - name: C2_epoch_wise_resampled_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: true
      experiment:
        noise_resample_mode: epoch

  - name: C3_step_wise_resampled_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: true
      experiment:
        noise_resample_mode: step
