# ResNet-20 — sign_coupled_scaling ablations (A/C suite, analogous to rank_collapse template tests)
# A: frozen v vs train/new v' at test vs resampled v during training
# C: refresh frequency when sign_scale_v_resample=true

experiment_name: resnet20_sign_coupled_scaling_suite
seed: 42
device: cuda

dataset: cifar10
data_root: ./datasets/cifar-10
num_classes: 10
val_split: 0.1

model_name: resnet20

batch_size: 128
epochs: 100
num_workers: 8
eval_interval: 1
save_interval: 10

optimizer:
  type: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 1e-4

scheduler:
  type: cosine

synth_noise:
  noise_type: sign_coupled_scaling
  sign_scale_alpha: 1.184030
  sign_scale_v_resample: false
  eval_seed: null

  noise_injection:
    stem: true
    layer1: true
    layer2: true
    layer3: true
    head: false

experiment:
  mode: synth_with_comp
  noise_resample_mode: null
  noise_sampling_interval: 1
  template_mixed_training: false
  template_mix_prob: 0.5
  eval_noise_seed: null

logging:
  use_wandb: false
  project_name: synth-noise-nn
  run_name: resnet20_sign_coupled_scaling_suite

suite:
  - name: A1_fixed_v_same_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: false
        eval_seed: null
      experiment:
        noise_resample_mode: null
        eval_noise_seed: null

  - name: A2_fixed_v_train_new_v_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: false
        eval_seed: 1
      experiment:
        noise_resample_mode: null
        eval_noise_seed: 1

  - name: A3_resampled_v_step_fresh_test
    group: A
    overrides:
      synth_noise:
        sign_scale_v_resample: true
        eval_seed: null
      experiment:
        noise_resample_mode: step
        eval_noise_seed: null

  - name: C1_frozen_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: false
      experiment:
        noise_resample_mode: null

  - name: C2_epoch_wise_resampled_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: true
      experiment:
        noise_resample_mode: epoch

  - name: C3_step_wise_resampled_v
    group: C
    overrides:
      synth_noise:
        sign_scale_v_resample: true
      experiment:
        noise_resample_mode: step
